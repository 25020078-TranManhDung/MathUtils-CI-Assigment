name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Lay code tu Repo
        uses: actions/checkout@v3

      - name: 2. Cai dat Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 3. Chay Build va Test
        # Su dung truc tiep Maven Wrapper ban da co
        run: chmod +x mvnw && ./mvnw clean package -ntp

      - name: 4. Luu file .jar (Artifact)
        uses: actions/upload-artifact@v3
        with:
          name: MathUtils-San-Pham
          path: target/*.jar